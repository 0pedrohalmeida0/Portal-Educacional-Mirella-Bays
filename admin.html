<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Adm - Mirella Bays</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="admin-wrapper">
        <nav class="admin-nav">
            <button onclick="mostrarAba('aba-novo-usuario')">Novo Usuário</button>
            <button onclick="mostrarAba('aba-lista-usuarios')">Usuários Ativos</button>
            <button onclick="mostrarAba('aba-agenda-geral')">Agenda Geral</button>
        </nav>

        <main class="admin-content">
            
            <section id="aba-novo-usuario" class="tab-content">
                <h2>Registrar Novo Aluno</h2>
                <form id="form-cadastro-aluno">
                    <div class="field">
                        <label>Nome Completo:</label>
                        <input type="text" id="reg-nome" required>
                    </div>
                    <div class="field">
                        <label>Username (Login):</label>
                        <input type="text" id="reg-user" required>
                    </div>
                    <div class="field">
                        <label>Senha:</label>
                        <input type="password" id="reg-senha" required>
                    </div>
                    <div class="field">
                        <label>Nível de Proficiência:</label>
                        <select id="reg-nivel">
                            <option value="A1">A1 (Iniciante)</option>
                            <option value="A2">A2 (Básico)</option>
                            <option value="B1">B1 (Intermediário)</option>
                            <option value="B2">B2 (Avançado)</option>
                            <option value="C1">C1 (Proficiente)</option>
                        </select>
                    </div>
                    <button type="button" class="btn-save" onclick="salvarNovoUsuario()">Cadastrar Aluno</button>
                </form>
            </section>

            <section id="aba-lista-usuarios" class="tab-content" style="display:none;">
                <h2>Gestão de Alunos Ativos</h2>
                <div id="container-lista-alunos">
                    <p>Carregando alunos...</p>
                </div>

                <div id="detalhes-aluno" class="detalhes-container" style="display:none;">
                    <hr>
                    <h3 id="nome-aluno-selecionado">Aluno: Nome</h3>
                    
                    <div class="acoes-admin">
                        <h4>Ações de Gestão</h4>
                        <button class="btn-danger" onclick="excluirUsuario()">Excluir Aluno</button>
                        <select id="edit-nivel-aluno">
                            <option value="A1">Mudar para A1</option>
                            <option value="A2">Mudar para A2</option>
                            <option value="B1">Mudar para B1</option>
                            <option value="B2">Mudar para B2</option>
                        </select>
                        <button onclick="atualizarNivel()">Atualizar Nível</button>
                    </div>

                    <div class="mural-gestao">
                        <h4>Mural do Aluno</h4>
                        <textarea id="msg-mural" placeholder="Escrever nova mensagem no mural..."></textarea>
                        <button onclick="publicarNoMural()">Publicar no Mural</button>
                        <div id="lista-mural-aluno">
                            </div>
                    </div>

                    <div class="agenda-gestao">
    <h4>Agendar Aulas (Recorrência)</h4>
    
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <div style="flex: 1;">
            <label style="font-size: 12px; display: block;">Início:</label>
            <input type="date" id="data-inicio" style="width: 100%;">
        </div>
        <div style="flex: 1;">
            <label style="font-size: 12px; display: block;">Fim:</label>
            <input type="date" id="data-fim" style="width: 100%;">
        </div>
    </div>

    <label style="font-size: 12px; display: block;">Horário:</label>
    <input type="time" id="hora-aula" style="width: 100%; margin-bottom: 10px;">

    <label style="font-size: 12px; display: block; margin-bottom: 5px;">Dias da Semana:</label>
    <div id="dias-semana" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
        <label style="font-size: 13px;"><input type="checkbox" value="1"> Seg</label>
        <label style="font-size: 13px;"><input type="checkbox" value="2"> Ter</label>
        <label style="font-size: 13px;"><input type="checkbox" value="3"> Qua</label>
        <label style="font-size: 13px;"><input type="checkbox" value="4"> Qui</label>
        <label style="font-size: 13px;"><input type="checkbox" value="5"> Sex</label>
        <label style="font-size: 13px;"><input type="checkbox" value="6"> Sáb</label>
        <label style="font-size: 13px;"><input type="checkbox" value="0"> Dom</label>
    </div>

    <button onclick="salvarAgendamento()" style="width: 100%; background-color: #28a745;">Marcar Aulas</button>
</div>
                </div>
            </section>

            <section id="aba-agenda-geral" class="tab-content" style="display:none;">
                <h2>Agenda Geral de Aulas</h2>
                <div id="calendario-admin">
                    </div>
                </footer>
            </section>

        </main>
    </div>
    <footer style="text-align: center; padding: 20px; color: #666; font-size: 0.8rem;">
        Copyright &copy; 2026 Pedro Henrique de Almeida
    </footer>

    <script src="admin.js"></script>
</body>
</html>
